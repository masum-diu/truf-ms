services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: truf-ms-app
    ports:
      - "8000:8080"
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: truf-ms-db
    environment:
      POSTGRES_DB: truf_ms
      POSTGRES_USER: truf_ms
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - truf_ms_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U truf_ms -d truf_ms"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  truf_ms_pgdata:
