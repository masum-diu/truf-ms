services:
  - type: web
    name: truf-ms
    runtime: docker
    plan: free
    region: singapore
    branch: main
    healthCheckPath: /up
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_NAME
        value: TurfBook
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /var/www/html/database/database.sqlite
      - key: SESSION_DRIVER
        value: file
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: SEED_DATABASE
        value: "true"
